# Font
font_family      Maple Mono NF Semibold
font_size        11

# Cursor (Tokyo Night Cyan/Magenta mix)
cursor           #c0caf5
cursor_text_color #1a1b26
cursor_shape     beam

# Padding
window_padding_width  7
window_padding_height 10

# Scrollback
scrollback_lines 3000

# Key bindings for font size
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0

# Background opacity (Keeping your 0.85 preference)
background_opacity 0.85

# Prevents the os window message
confirm_os_window_close 0

# --- Tokyo Night Storm Theme ---

# Background: Deep Indigo
background        #1a1b26
# Foreground: High contrast silver/blue
foreground        #c0caf5

# Selection: Dark slate blue
selection_background #33467c
selection_foreground #c0caf5

# URL color (Cyan)
url_color #73daca

# ANSI Colors 

# Black (Deep Background/Gutter)
color0  #15161e
color8  #414868

# Red (Tokyo Red)
color1  #f7768e
color9  #f7768e

# Green (Terminal Green)
color2  #9ece6a
color10 #9ece6a

# Yellow (Soft Orange/Yellow)
color3  #e0af68
color11 #e0af68

# Blue (Indigo Blue)
color4  #7aa2f7
color12 #7aa2f7

# Magenta (Pink/Purple)
color5  #bb9af7
color13 #bb9af7

# Cyan (Stormy Teal)
color6  #7dcfff
color14 #7dcfff

# White (Soft Text)
color7  #a9b1d6
color15 #c0caf5

enable_audio_bell no
