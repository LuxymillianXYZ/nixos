[main]
font=Maple Mono NF:weight=bold:size=12
line-height=22
fields=name,generic,comment,categories,filename,keywords
terminal=kitty -e 
prompt="❯   " 
layer=overlay
lines=10
show-icons=yes

[colors]
# Background: Updated to #171716 at 100% opacity
background=171716ff

# Text: Soft icy blue/grey (c8d3df) from the sky reflection
text=c8d3dfff

# Match: Pale orange highlight (d59b73) for search results
match=d59b73ff

# Selection: Muted mid-tone blue (4b5a6c)
selection=4b5a6cff

# Selection Match: Brighter peach (e3c396) for contrast on selection
selection-match=e3c396ff

# Selection Text: Light sky blue (eef3f7)
selection-text=eef3f7ff

# Border: Muted water blue (6a95a5) to frame the window
border=6a95a5ff

[border]
# Set radius to 0 for sharp corners
radius=0
width=2
